<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Reachy Mini · Control Center</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e; --accent:#2f81f7;
    --on:#3fb950; --off:#f85149; --warn:#d29922;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5}
  .wrap{max-width:880px;margin:0 auto;padding:24px 16px 64px}
  h1{font-size:22px;margin:0 0 4px;display:flex;align-items:center;gap:10px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:20px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:18px;margin-bottom:18px}
  .row{display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .dot{width:11px;height:11px;border-radius:50%;display:inline-block}
  .dot.on{background:var(--on);box-shadow:0 0 8px var(--on)}
  .dot.off{background:var(--off)}
  .dot.warn{background:var(--warn)}
  .stat{flex:1;min-width:150px;background:var(--panel2);border:1px solid var(--border);
    border-radius:10px;padding:12px 14px}
  .stat .k{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .stat .v{font-size:16px;font-weight:600;margin-top:3px}
  button{font:inherit;border:0;border-radius:9px;padding:11px 18px;cursor:pointer;
    font-weight:600;color:#fff;transition:.12s}
  button:disabled{opacity:.5;cursor:not-allowed}
  .btn-on{background:var(--on)} .btn-on:hover{filter:brightness(1.08)}
  .btn-off{background:var(--off)} .btn-off:hover{filter:brightness(1.08)}
  .btn-ghost{background:var(--panel2);border:1px solid var(--border)}
  .btn-sm{padding:6px 12px;font-size:13px;font-weight:500}
  label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
  input,select{font:inherit;background:var(--panel2);border:1px solid var(--border);
    color:var(--text);border-radius:8px;padding:9px 10px;width:100%}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  h2{font-size:15px;margin:0 0 14px;color:var(--text)}
  .log{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;
    color:var(--muted);max-height:170px;overflow:auto;white-space:pre-wrap}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--panel2);border:1px solid var(--border);padding:10px 16px;
    border-radius:9px;opacity:0;transition:.2s;pointer-events:none}
  .toast.show{opacity:1}
  .muted{color:var(--muted)}

  /* weekly calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:10px}
  .cal-head h2{margin:0}
  .cal-nav{display:flex;align-items:center;gap:8px}
  .cal-nav .range{color:var(--muted);font-size:13px;margin-left:4px}
  .legend{display:flex;gap:18px;font-size:12px;color:var(--muted);margin-bottom:12px;flex-wrap:wrap}
  .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-1px;margin-right:6px}
  .legend i.on{background:rgba(63,185,80,.30);border:1px solid var(--on)}
  .legend i.off{background:var(--off)}
  .cal{border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .cal-scroll{max-height:600px;overflow:auto}
  .cal-grid{display:grid;grid-template-columns:52px repeat(7,1fr);grid-template-rows:auto var(--dpx);
    position:relative;min-width:600px}
  .cal-corner{position:sticky;top:0;left:0;z-index:4;background:var(--panel);border-bottom:1px solid var(--border)}
  .cal-dayhead{position:sticky;top:0;z-index:3;background:var(--panel);border-bottom:1px solid var(--border);
    border-left:1px solid var(--border);text-align:center;padding:6px 2px}
  .cal-dayhead .wd{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .cal-dayhead .dn{font-size:15px;font-weight:600;margin-top:3px;width:24px;height:24px;line-height:24px;
    border-radius:50%;display:inline-block}
  .cal-dayhead.today .dn{color:#fff;background:var(--accent)}
  .cal-gutter{position:relative;background:var(--panel)}
  .cal-gutter .hr{position:absolute;right:6px;font-size:10px;color:var(--muted);transform:translateY(-6px)}
  .cal-col{position:relative;border-left:1px solid var(--border);
    background-image:repeating-linear-gradient(to bottom,transparent 0,transparent calc(var(--hpx) - 1px),
      var(--border) calc(var(--hpx) - 1px),var(--border) var(--hpx))}
  .cal-col.today{background-color:rgba(47,129,247,.05)}
  .on-block{position:absolute;left:0;right:0;background:rgba(63,185,80,.16);border-left:3px solid var(--on)}
  .ev{position:absolute;left:3px;right:3px;min-height:15px;border-radius:5px;padding:1px 5px;font-size:11px;
    font-weight:600;color:#fff;overflow:hidden;cursor:pointer;white-space:nowrap;text-overflow:ellipsis;z-index:2}
  .ev.on{background:var(--on)}
  .ev.off{background:var(--off)}
  .ev.disabled{opacity:.4;filter:grayscale(.4)}
  .now-line{position:absolute;left:0;right:0;height:2px;background:#ff5252;z-index:3}
  .now-line::before{content:"";position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#ff5252}
  .cal-menu{position:fixed;z-index:50;background:var(--panel2);border:1px solid var(--border);border-radius:9px;
    padding:10px 12px;min-width:170px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .cal-menu .cal-menu-t{font-size:13px;font-weight:600;margin-bottom:2px}
  .cal-menu .cal-menu-btns{display:flex;gap:8px;margin-top:10px}

  /* day-of-week picker */
  .dow-pick{display:flex;gap:6px;flex-wrap:wrap}
  .dow-pick button{background:var(--panel2);border:1px solid var(--border);color:var(--muted);
    border-radius:8px;padding:9px 0;width:46px;font-weight:600;font-size:13px;cursor:pointer}
  .dow-pick button.sel{background:var(--accent);border-color:var(--accent);color:#fff}
  .dow-quick{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
  input[type=date]{color-scheme:dark}
</style>
</head>
<body>
<div class="wrap">
  <h1><span id="power-dot" class="dot off"></span> Reachy Mini · Control Center</h1>
  <div class="sub" id="clock">—</div>

  <div class="card">
    <div class="grid" style="margin-bottom:16px">
      <div class="stat"><div class="k">Backend</div><div class="v" id="s-daemon">—</div></div>
      <div class="stat"><div class="k">Running app</div><div class="v" id="s-app">—</div></div>
      <div class="stat"><div class="k">Control bus</div><div class="v" id="s-bus">—</div></div>
      <div class="stat"><div class="k">App UI :7860</div><div class="v" id="s-ui">—</div></div>
    </div>
    <div class="row">
      <div style="flex:1;min-width:180px">
        <label>App to launch on power-on</label>
        <input id="app-name" value="reachy_mini_conversation_app"/>
      </div>
      <div style="display:flex;gap:10px;align-self:flex-end">
        <button class="btn-on" id="btn-on">Power ON</button>
        <button class="btn-off" id="btn-off">Power OFF</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Add timer</h2>
    <div class="grid">
      <div>
        <label>Action</label>
        <select id="t-action"><option value="on">Turn ON</option><option value="off">Turn OFF</option></select>
      </div>
      <div>
        <label>Repeat</label>
        <select id="t-kind">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly (pick days)</option>
          <option value="once">Once</option>
        </select>
      </div>
      <div id="t-date-wrap" style="display:none">
        <label>Date</label>
        <input id="t-date" type="date"/>
      </div>
      <div>
        <label id="t-time-label">Time (HH:MM)</label>
        <input id="t-time" placeholder="14:30"/>
      </div>
      <div>
        <label>Label (optional)</label>
        <input id="t-label" placeholder="e.g. Morning greet"/>
      </div>
    </div>

    <div id="t-days-wrap" style="display:none;margin-top:12px">
      <label>Days of week</label>
      <div class="dow-pick" id="t-days">
        <button type="button" data-d="0">Sun</button>
        <button type="button" data-d="1">Mon</button>
        <button type="button" data-d="2">Tue</button>
        <button type="button" data-d="3">Wed</button>
        <button type="button" data-d="4">Thu</button>
        <button type="button" data-d="5">Fri</button>
        <button type="button" data-d="6">Sat</button>
      </div>
      <div class="dow-quick">
        <button type="button" class="btn-ghost btn-sm" id="t-days-all">All days (= daily)</button>
        <button type="button" class="btn-ghost btn-sm" id="t-days-wd">Weekdays</button>
        <button type="button" class="btn-ghost btn-sm" id="t-days-we">Weekend</button>
        <button type="button" class="btn-ghost btn-sm" id="t-days-clear">Clear</button>
      </div>
    </div>

    <div class="row" style="margin-top:12px">
      <div id="t-app-wrap" style="flex:1;min-width:200px">
        <label>App (for ON timers)</label>
        <input id="t-app" value="reachy_mini_conversation_app"/>
      </div>
      <button class="btn-ghost" id="btn-add" style="align-self:flex-end">Add timer</button>
    </div>
  </div>

  <div class="card">
    <div class="cal-head">
      <h2>Scheduled timers</h2>
      <div class="cal-nav">
        <button class="btn-ghost btn-sm" id="cal-prev" title="Previous week">‹</button>
        <button class="btn-ghost btn-sm" id="cal-today">This week</button>
        <button class="btn-ghost btn-sm" id="cal-next" title="Next week">›</button>
        <span class="range" id="cal-range">—</span>
      </div>
    </div>
    <div class="legend">
      <span><i class="on"></i>ON — robot running (green continues until an OFF)</span>
      <span><i class="off"></i>OFF — robot sleeps</span>
    </div>
    <div class="cal"><div class="cal-scroll"><div class="cal-grid" id="cal-grid"></div></div></div>
  </div>

  <div class="card">
    <h2>Activity log</h2>
    <div class="log" id="log">—</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
function toast(msg){const t=$("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);}
async function api(path, method="GET", body){
  const opt={method,headers:{"Content-Type":"application/json"}};
  if(body) opt.body=JSON.stringify(body);
  const r=await fetch(path,opt); return r.json().catch(()=>({}));
}

async function refreshStatus(){
  let s; try{ s=await api("/api/status"); }catch(e){ return; }
  $("clock").textContent = s.now + (s.busy ? "  ·  working…" : "");
  $("s-daemon").textContent = s.daemon_state || "unreachable";
  const app = s.app && s.app.info ? (s.app.info.name + " ("+(s.app.state)+")") : "none";
  $("s-app").textContent = app;
  $("s-bus").textContent = s.control_bus_up ? "up" : "down";
  $("s-ui").textContent = s.app_ui_up ? "up" : "down";
  const live = s.daemon_state==="running" && s.control_bus_up;
  $("power-dot").className = "dot "+(live?"on":(s.busy?"warn":"off"));
  $("btn-on").disabled = s.busy; $("btn-off").disabled = s.busy;
  $("log").textContent = (s.log||[]).map(l=>l.ts+"  "+l.msg).join("\n") || "—";
}

/* ---- weekly calendar ------------------------------------------------------ */
const HPX = 24;            // pixels per hour
const DPX = HPX * 24;      // pixels per day column
const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
let lastTimers = [];
let calWeekStart = startOfWeek(new Date());
let menuOpen = false;

function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,
  c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function startOfWeek(d){const x=new Date(d.getFullYear(),d.getMonth(),d.getDate());x.setDate(x.getDate()-x.getDay());return x;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function pad2(n){return (n<10?"0":"")+n;}
function fmtWhen(t){
  if(t.kind==="daily") return "daily "+t.time;
  if(t.kind==="weekly") return (t.days||[]).map(d=>DOW[d]).join(",")+" "+t.time;
  return "once "+(t.time||"").replace("T"," ");
}

// Expand the configured timers into concrete dated events within the shown week.
function buildEvents(timers, weekStart){
  const weekEnd = addDays(weekStart,7);
  const evs=[];
  for(const t of timers){
    if(t.kind==="daily" || t.kind==="weekly"){
      const days = t.kind==="weekly" ? (t.days||[]) : [0,1,2,3,4,5,6];
      const p=(t.time||"0:0").split(":"); const hh=+p[0]||0, mm=+p[1]||0;
      for(let d=0;d<7;d++){
        const when=addDays(weekStart,d);
        if(!days.includes(when.getDay())) continue;
        when.setHours(hh,mm,0,0);
        evs.push({time:when,action:t.action,timer:t});
      }
    } else {
      const when=new Date(t.time);
      if(!isNaN(when) && when>=weekStart && when<weekEnd)
        evs.push({time:when,action:t.action,timer:t});
    }
  }
  return evs;
}

// Green = robot ON. An ON starts a green stretch that runs forward (even across
// midnight) until an OFF ends it. OFF only terminates green; it never shades.
function greenIntervals(evs, weekStart){
  const weekEnd=addDays(weekStart,7);
  const act=evs.filter(e=>e.timer.enabled!==false).sort((a,b)=>a.time-b.time);
  const out=[]; let on=false, start=null;
  for(const e of act){
    if(e.action==="on"){ if(!on){on=true; start=e.time;} }
    else { if(on){ out.push([start,e.time]); on=false; start=null; } }
  }
  if(on) out.push([start,weekEnd]);
  return out;
}

function renderCal(){
  const grid=$("cal-grid");
  grid.style.setProperty("--hpx",HPX+"px");
  grid.style.setProperty("--dpx",DPX+"px");
  grid.innerHTML="";
  const now=new Date(), todayKey=now.toDateString();

  grid.appendChild(Object.assign(document.createElement("div"),{className:"cal-corner"}));
  for(let d=0;d<7;d++){
    const day=addDays(calWeekStart,d);
    const h=document.createElement("div");
    h.className="cal-dayhead"+(day.toDateString()===todayKey?" today":"");
    h.innerHTML='<div class="wd">'+DOW[day.getDay()]+'</div><div class="dn">'+day.getDate()+'</div>';
    grid.appendChild(h);
  }
  const gutter=document.createElement("div"); gutter.className="cal-gutter";
  for(let h=1;h<24;h++){
    const lab=document.createElement("div"); lab.className="hr";
    lab.style.top=(h*HPX)+"px"; lab.textContent=pad2(h)+":00";
    gutter.appendChild(lab);
  }
  grid.appendChild(gutter);

  const evs=buildEvents(lastTimers, calWeekStart);
  const greens=greenIntervals(evs, calWeekStart);
  const cols=[];
  for(let d=0;d<7;d++){
    const day=addDays(calWeekStart,d), dayEnd=addDays(day,1);
    const col=document.createElement("div");
    col.className="cal-col"+(day.toDateString()===todayKey?" today":"");
    for(const [s,e] of greens){
      const segS=s>day?s:day, segE=e<dayEnd?e:dayEnd;
      if(segE>segS){
        const b=document.createElement("div"); b.className="on-block";
        b.style.top=((segS-day)/3600000*HPX)+"px";
        b.style.height=((segE-segS)/3600000*HPX)+"px";
        col.appendChild(b);
      }
    }
    if(day.toDateString()===todayKey){
      const nl=document.createElement("div"); nl.className="now-line";
      nl.style.top=((now.getHours()*60+now.getMinutes())/60*HPX)+"px";
      col.appendChild(nl);
    }
    cols.push(col); grid.appendChild(col);
  }

  for(const ev of evs){
    const d=Math.floor((ev.time - calWeekStart)/86400000);
    if(d<0||d>6) continue;
    const day=addDays(calWeekStart,d);
    const disabled = ev.timer.enabled===false;
    const chip=document.createElement("div");
    chip.className="ev "+(ev.action==="on"?"on":"off")+(disabled?" disabled":"");
    chip.style.top=Math.max(0,(ev.time-day)/3600000*HPX)+"px";
    const tm=pad2(ev.time.getHours())+":"+pad2(ev.time.getMinutes());
    const lbl=ev.timer.label ? " "+ev.timer.label : (ev.action==="on"?" ON":" OFF");
    chip.textContent=tm+lbl;
    chip.title=(ev.action==="on"?"ON":"OFF")+" "+tm+(ev.timer.label?" — "+ev.timer.label:"")+(disabled?" (disabled)":"");
    chip.onclick=(e)=>{e.stopPropagation(); openMenu(e, ev.timer);};
    cols[d].appendChild(chip);
  }

  const wkEnd=addDays(calWeekStart,6);
  $("cal-range").textContent =
    MONTHS[calWeekStart.getMonth()]+" "+calWeekStart.getDate()+" – "+
    MONTHS[wkEnd.getMonth()]+" "+wkEnd.getDate()+", "+wkEnd.getFullYear();
}

function closeMenu(){const m=document.querySelector(".cal-menu"); if(m) m.remove(); menuOpen=false;}
function openMenu(e, timer){
  closeMenu(); menuOpen=true;
  const m=document.createElement("div"); m.className="cal-menu";
  m.onclick=ev=>ev.stopPropagation();
  m.innerHTML=
    '<div class="cal-menu-t">'+(timer.action==="on"?"ON":"OFF")+' · '+esc(fmtWhen(timer))+'</div>'+
    (timer.label?'<div class="muted" style="font-size:12px">'+esc(timer.label)+'</div>':'')+
    (timer.action==="on"?'<div class="muted" style="font-size:12px">app: '+esc(timer.app_name||"")+'</div>':'')+
    '<div class="cal-menu-btns">'+
      '<button class="btn-ghost btn-sm" data-act="toggle">'+(timer.enabled===false?"Enable":"Disable")+'</button>'+
      '<button class="btn-off btn-sm" data-act="del">Delete</button>'+
    '</div>';
  document.body.appendChild(m);
  const pad=8, r=m.getBoundingClientRect();
  let x=e.clientX, y=e.clientY+10;
  if(x+r.width+pad>innerWidth) x=innerWidth-r.width-pad;
  if(y+r.height+pad>innerHeight) y=e.clientY-r.height-10;
  m.style.left=Math.max(pad,x)+"px"; m.style.top=Math.max(pad,y)+"px";
  m.querySelector('[data-act="del"]').onclick=async()=>{
    await api("/api/timers/delete","POST",{id:timer.id}); closeMenu(); refreshTimers();};
  m.querySelector('[data-act="toggle"]').onclick=async()=>{
    await api("/api/timers/toggle","POST",{id:timer.id,enabled:timer.enabled===false}); closeMenu(); refreshTimers();};
}
document.addEventListener("click",()=>{ if(menuOpen) closeMenu(); });

async function refreshTimers(){
  const d=await api("/api/timers");
  lastTimers = (d && d.timers) ? d.timers : [];
  if(!menuOpen) renderCal();
}

$("btn-on").onclick=async()=>{const r=await api("/api/power/on","POST",{app_name:$("app-name").value});
  toast(r.ok?"Powering on…":("Error: "+(r.error||"failed"))); setTimeout(refreshStatus,800);};
$("btn-off").onclick=async()=>{const r=await api("/api/power/off","POST",{});
  toast(r.ok?"Powering off…":("Error: "+(r.error||"failed"))); setTimeout(refreshStatus,800);};

function updateKindUI(){
  const k=$("t-kind").value;
  $("t-date-wrap").style.display = k==="once"   ? "block":"none";
  $("t-days-wrap").style.display = k==="weekly" ? "block":"none";
}
$("t-kind").onchange=updateKindUI;
$("t-action").onchange=()=>{$("t-app-wrap").style.display = $("t-action").value==="on"?"block":"none";};

const daysBox=$("t-days");
daysBox.querySelectorAll("button").forEach(b=>b.onclick=()=>b.classList.toggle("sel"));
function setDays(arr){daysBox.querySelectorAll("button").forEach(b=>b.classList.toggle("sel",arr.includes(+b.dataset.d)));}
$("t-days-all").onclick=()=>setDays([0,1,2,3,4,5,6]);
$("t-days-wd").onclick=()=>setDays([1,2,3,4,5]);
$("t-days-we").onclick=()=>setDays([0,6]);
$("t-days-clear").onclick=()=>setDays([]);
updateKindUI();

$("cal-prev").onclick=()=>{calWeekStart=addDays(calWeekStart,-7); renderCal();};
$("cal-next").onclick=()=>{calWeekStart=addDays(calWeekStart,7); renderCal();};
$("cal-today").onclick=()=>{calWeekStart=startOfWeek(new Date()); renderCal();};

$("btn-add").onclick=async()=>{
  const kind=$("t-kind").value;
  const time=$("t-time").value.trim();
  const body={action:$("t-action").value,kind,label:$("t-label").value,app_name:$("t-app").value};
  if(kind==="once"){
    const dt=$("t-date").value;
    if(!dt){toast("Pick a date"); return;}
    if(!time){toast("Enter a time (HH:MM)"); return;}
    body.time = dt+"T"+time;
  }else if(kind==="weekly"){
    const days=[...daysBox.querySelectorAll("button.sel")].map(b=>+b.dataset.d);
    if(!days.length){toast("Pick at least one day"); return;}
    body.time = time;
    if(days.length===7){ body.kind="daily"; }   // all days == plain daily
    else { body.days=days; }
  }else{
    body.time = time;
  }
  const r=await api("/api/timers/add","POST",body);
  if(r.ok){toast("Timer added"); $("t-time").value=""; $("t-label").value=""; setDays([]); refreshTimers();}
  else toast("Error: "+(r.error||"failed"));
};

refreshStatus(); refreshTimers();
setInterval(refreshStatus,4000);
setInterval(refreshTimers,8000);
</script>
</body>
</html>
